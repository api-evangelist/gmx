openapi: 3.0.0
info:
  title: '@gmx-io/gmx-public-api Allowances Markets API'
  version: 1.0.0
  license:
    name: Copyright
  contact: {}
servers:
- url: /v1
tags:
- name: Markets
paths:
  /markets:
    get:
      operationId: GetMarkets
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/MarketWithTiersResponse'
                type: array
        '500':
          description: Internal Server Error
      tags:
      - Markets
      security: []
      parameters: []
  /markets/tickers:
    get:
      operationId: GetMarketsTickers
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/MarketTickerResponse'
                type: array
        '400':
          description: Bad Request - Invalid market addresses or symbols
        '500':
          description: Internal Server Error
      tags:
      - Markets
      security: []
      parameters:
      - in: query
        name: addresses
        required: false
        schema:
          type: array
          items:
            type: string
      - in: query
        name: symbols
        required: false
        schema:
          type: array
          items:
            type: string
  /markets/info:
    get:
      operationId: GetMarketsInfo
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/MarketInfoResponse'
                type: array
        '500':
          description: Internal Server Error
      tags:
      - Markets
      security: []
      parameters: []
  /markets/config:
    get:
      operationId: GetMarketsConfig
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/MarketConfigResponse'
                type: array
        '500':
          description: Internal Server Error
      tags:
      - Markets
      security: []
      parameters: []
  /markets/values:
    get:
      operationId: GetMarketsValues
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/MarketValuesResponse'
                type: array
        '500':
          description: Internal Server Error
      tags:
      - Markets
      security: []
      parameters: []
