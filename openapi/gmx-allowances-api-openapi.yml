openapi: 3.0.0
info:
  title: '@gmx-io/gmx-public-api Allowances API'
  version: 1.0.0
  license:
    name: Copyright
  contact: {}
servers:
- url: /v1
tags:
- name: Allowances
paths:
  /allowances:
    get:
      operationId: GetAllowances
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TokenAllowance'
                type: array
        '400':
          description: Bad Request - Invalid address or spender
        '500':
          description: Internal Server Error
      tags:
      - Allowances
      security: []
      parameters:
      - in: query
        name: address
        required: true
        schema:
          type: string
      - in: query
        name: spender
        required: true
        schema:
          type: string
components:
  schemas:
    TokenAllowance:
      properties:
        allowance:
          type: string
        decimals:
          type: number
          format: double
        address:
          type: string
        symbol:
          type: string
      required:
      - allowance
      - decimals
      - address
      - symbol
      type: object
