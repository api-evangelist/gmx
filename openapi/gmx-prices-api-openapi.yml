openapi: 3.0.0
info:
  title: '@gmx-io/gmx-public-api Allowances Prices API'
  version: 1.0.0
  license:
    name: Copyright
  contact: {}
servers:
- url: /v1
tags:
- name: Prices
paths:
  /prices/ohlcv:
    get:
      operationId: GetOhlcv
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/OhlcvCandle'
                type: array
        '400':
          description: Bad Request - Invalid parameters
        '500':
          description: Internal Server Error
      tags:
      - Prices
      security: []
      parameters:
      - in: query
        name: symbol
        required: true
        schema:
          type: string
      - in: query
        name: timeframe
        required: true
        schema:
          type: string
      - in: query
        name: limit
        required: false
        schema:
          format: double
          type: number
      - description: Unix timestamp in milliseconds
        in: query
        name: since
        required: false
        schema:
          format: double
          type: number
components:
  schemas:
    OhlcvCandle:
      properties:
        close:
          type: string
        low:
          type: string
        high:
          type: string
        open:
          type: string
        timestamp:
          type: number
          format: double
      required:
      - close
      - low
      - high
      - open
      - timestamp
      type: object
