openapi: 3.0.0
info:
  title: '@gmx-io/gmx-public-api Allowances Pairs API'
  version: 1.0.0
  license:
    name: Copyright
  contact: {}
servers:
- url: /v1
tags:
- name: Pairs
paths:
  /pairs:
    get:
      operationId: GetPairs
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PairResponse'
                type: array
        '500':
          description: Internal Server Error
      tags:
      - Pairs
      security: []
      parameters: []
components:
  schemas:
    PairResponse:
      properties:
        liquidity_in_usd:
          type: number
          format: double
        pool_id:
          type: string
        volume_usd:
          type: number
          format: double
        next_funding_rate_timestamp:
          type: number
          format: double
        next_funding_rate:
          type: number
          format: double
        funding_rate:
          type: number
          format: double
        short_open_interest:
          type: number
          format: double
        long_open_interest:
          type: number
          format: double
        open_interest:
          type: number
          format: double
        low:
          type: number
          format: double
        high:
          type: number
          format: double
        last_price:
          type: number
          format: double
        product_type:
          type: string
        target_volume:
          type: number
          format: double
        base_volume:
          type: number
          format: double
        target_currency:
          type: string
        base_currency:
          type: string
        ticker_id:
          type: string
      required:
      - pool_id
      - last_price
      - product_type
      - target_volume
      - base_volume
      - target_currency
      - base_currency
      - ticker_id
      type: object
