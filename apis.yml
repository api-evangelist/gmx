aid: gmx
url: https://raw.githubusercontent.com/api-evangelist/gmx/refs/heads/main/apis.yml
name: GMX
kind: company
description: 'GMX is a decentralized perpetual and spot exchange deployed on Arbitrum,
  Avalanche, Botanix, and MegaETH, supporting trades with up to 100x leverage and
  low-price-impact token swaps powered by oracle-based pricing. The platform exposes
  four integration surfaces: a GMX REST API (primary, OpenAPI-documented) for account
  data, orders, analytics, and relayed workflows; an Oracle API (stable) for oracle
  prices, markets, liquidity snapshots, and APY; a GraphQL API via Subsquid for historical
  on-chain data; and an MCP server plus TypeScript SDK for AI-agent and programmatic
  access. Data coverage includes markets, tickers, tokens, positions, orders, rates,
  APY, performance, wallet balances, GLP/GM/GLV token analytics, OHLCV, buyback stats,
  and staking power.'
