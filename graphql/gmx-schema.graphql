# GMX GraphQL Schema
#
# Source: Live introspection of https://gmx.squids.live/gmx-synthetics-arbitrum:prod/api/graphql
#         (Subsquid-powered GMX Synthetics v2 indexer, Arbitrum)
#         plus legacy v1 entities from https://github.com/gmx-io/gmx-subgraph (master branch)
#
# Introspected: June 2026
# Schema covers: positions, orders, trades, fees, funding rates, borrowing rates,
#   markets, prices, referrals, staking, claimable amounts, multichain funding,
#   GLV vaults, APR snapshots, volume tracking, and protocol statistics.
#
# Monetary values: BigInt with 30-decimal precision (1e30 = 1 USD) unless noted.
# All addresses: lowercase hex strings.

scalar BigInt
scalar BigDecimal
scalar Bytes

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enum PriceType {
  CHAINLINK
  FAST
  ARCHIVE
}

enum PositionChangeType {
  INCREASE
  DECREASE
  LIQUIDATION
  AUTO_DELEVERAGING
}

enum OrderStatus {
  Created
  Executed
  Cancelled
  Frozen
}

enum ClaimActionType {
  ClaimFunding
  ClaimPriceImpact
  ClaimCollateral
  SettleFundingFeeCreated
  SettleFundingFeeExecuted
  SettleFundingFeeCancelled
}

enum EntityType {
  Market
  Glv
}

enum OnChainSettingType {
  UINT
  INT
  ADDRESS
  BOOL
  BYTES32
  BYTES
}

enum PositionFeesEntityType {
  PositionFees
  BorrowingFees
  FundingFees
}

enum MultichainFundingOperation {
  SEND
  RECEIVE
  SAME_CHAIN
}

enum Period {
  hourly
  daily
  weekly
  total
}

enum PricePeriod {
  any
  last
  daily
  hourly
}

enum LiquidationType {
  full
  partial
}

# ---------------------------------------------------------------------------
# Pagination / Connection types
# ---------------------------------------------------------------------------

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# ---------------------------------------------------------------------------
# Protocol-level statistics
# ---------------------------------------------------------------------------

"""Aggregate platform statistics: deposited users, traded users, total volume."""
type PlatformStats {
  id: String!
  depositedUsers: Int
  tradedUsers: Int
  volume: BigInt
}

type PlatformStatsEdge {
  node: PlatformStats!
  cursor: String!
}

type PlatformStatsConnection {
  edges: [PlatformStatsEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

# ---------------------------------------------------------------------------
# Market
# ---------------------------------------------------------------------------

"""
Market identity record. Each GMX Synthetics market is a three-token tuple:
index token (the asset being traded), long collateral token, and short collateral token.
"""
type Market {
  id: String!
  indexToken: String!
  longToken: String!
  shortToken: String!
}

type MarketEdge {
  node: Market!
  cursor: String!
}

type MarketsConnection {
  edges: [MarketEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

"""
Full market configuration snapshot including pool amounts, open interest,
impact factors, borrowing/funding parameters, and pool value.
"""
type MarketInfo {
  id: String!
  isDisabled: Boolean
  marketTokenAddress: String
  longTokenAddress: String
  shortTokenAddress: String
  indexTokenAddress: String

  # Pool amounts
  marketTokenSupply: BigInt
  longPoolAmount: BigInt
  shortPoolAmount: BigInt
  maxLongPoolAmount: BigInt
  maxShortPoolAmount: BigInt
  maxLongPoolUsdForDeposit: BigInt
  maxShortPoolUsdForDeposit: BigInt

  # Pool value
  poolValueMax: BigInt
  poolValueMin: BigInt
  poolValue: BigInt

  # Reserve factors
  reserveFactorLong: BigInt
  reserveFactorShort: BigInt
  openInterestReserveFactorLong: BigInt
  openInterestReserveFactorShort: BigInt

  # Open interest caps
  maxOpenInterestLong: BigInt
  maxOpenInterestShort: BigInt

  # Borrowing parameters
  optimalUsageFactorLong: BigInt
  optimalUsageFactorShort: BigInt
  baseBorrowingFactorLong: BigInt
  baseBorrowingFactorShort: BigInt
  borrowingFactorLong: BigInt
  borrowingFactorShort: BigInt
  borrowingExponentFactorLong: BigInt
  borrowingExponentFactorShort: BigInt
  aboveOptimalUsageBorrowingFactorLong: BigInt
  aboveOptimalUsageBorrowingFactorShort: BigInt

  # Funding parameters
  fundingFactor: BigInt
  fundingExponentFactor: BigInt
  fundingIncreaseFactorPerSecond: BigInt
  fundingDecreaseFactorPerSecond: BigInt
  thresholdForStableFunding: BigInt
  thresholdForDecreaseFunding: BigInt
  minFundingFactorPerSecond: BigInt
  maxFundingFactorPerSecond: BigInt

  # Live rates
  borrowingFactorPerSecondForLongs: BigInt
  borrowingFactorPerSecondForShorts: BigInt
  fundingFactorPerSecond: BigInt
  longsPayShorts: Boolean
  savedFundingFactorPerSecond: BigInt
  fundingUpdatedAt: Int

  # Fees
  totalBorrowingFees: BigInt

  # Position impact pool
  positionImpactPoolAmount: BigInt
  minPositionImpactPoolAmount: BigInt
  positionImpactPoolDistributionRate: BigInt

  # Collateral factors
  minCollateralFactor: BigInt
  minCollateralFactorForLiquidation: BigInt
  minCollateralFactorForOpenInterestLong: BigInt
  minCollateralFactorForOpenInterestShort: BigInt

  # Swap impact pools
  swapImpactPoolAmountLong: BigInt
  swapImpactPoolAmountShort: BigInt

  # Max PnL factors
  maxPnlFactorForTradersLong: BigInt
  maxPnlFactorForTradersShort: BigInt

  # Open interest by side and token
  longOpenInterestUsd: BigInt
  shortOpenInterestUsd: BigInt
  longOpenInterestInTokens: BigInt
  shortOpenInterestInTokens: BigInt
  longOpenInterestUsingLongToken: BigInt
  longOpenInterestUsingShortToken: BigInt
  shortOpenInterestUsingLongToken: BigInt
  shortOpenInterestUsingShortToken: BigInt
  longOpenInterestInTokensUsingLongToken: BigInt
  longOpenInterestInTokensUsingShortToken: BigInt
  shortOpenInterestInTokensUsingLongToken: BigInt
  shortOpenInterestInTokensUsingShortToken: BigInt

  # Position fee factors
  positionFeeFactorForPositiveImpact: BigInt
  positionFeeFactorForNegativeImpact: BigInt

  # Position impact factors
  positionImpactFactorPositive: BigInt
  positionImpactFactorNegative: BigInt
  maxPositionImpactFactorPositive: BigInt
  maxPositionImpactFactorNegative: BigInt
  maxPositionImpactFactorForLiquidations: BigInt
  positionImpactExponentFactorPositive: BigInt
  positionImpactExponentFactorNegative: BigInt

  # Lendable impact
  maxLendableImpactFactor: BigInt
  maxLendableImpactFactorForWithdrawals: BigInt
  maxLendableImpactUsd: BigInt
  lentPositionImpactPoolAmount: BigInt

  # Swap fees
  atomicSwapFeeFactor: BigInt
  swapFeeFactorForPositiveImpact: BigInt
  swapFeeFactorForNegativeImpact: BigInt
  swapImpactFactorPositive: BigInt
  swapImpactFactorNegative: BigInt
  swapImpactExponentFactor: BigInt

  # Virtual IDs (for price impact calculation across correlated markets)
  virtualPoolAmountForLongToken: BigInt
  virtualPoolAmountForShortToken: BigInt
  virtualInventoryForPositions: BigInt
  virtualMarketId: String
  virtualIndexTokenId: String
  virtualLongTokenId: String
}

type MarketInfoEdge {
  node: MarketInfo!
  cursor: String!
}

type MarketInfosConnection {
  edges: [MarketInfoEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

