# ---------------------------------------------------------------------------

"""
Per-account position snapshot. Tracks current state including size, collateral,
realized and unrealized PnL, leverage, and accumulated fees.
"""
type Position {
  id: String!
  positionKey: String
  account: String
  market: String
  collateralToken: String
  isLong: Boolean
  collateralAmount: BigInt
  sizeInTokens: BigInt
  sizeInUsd: BigInt
