  realizedFees: BigInt
  realizedPriceImpact: BigInt
  unrealizedFees: BigInt
  unrealizedPriceImpact: BigInt
  unrealizedPnl: BigInt
  leverage: BigInt
  qualifyingPnl: BigInt
  openedAt: Int
  isSnapshot: Boolean
  snapshotTimestamp: Int
  maxCapital: BigInt
}

type PositionEdge {
  node: Position!
  cursor: String!
}

type PositionsConnection {
  edges: [PositionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

"""
Event-level record of every position change (open, increase, decrease, close,
liquidation, ADL). Contains full fee breakdown and price impact details.
"""
type PositionChange {
  id: String!
  type: PositionChangeType
  orderKey: String
  positionKey: String
  account: String
  market: String
  collateralToken: String
  isLong: Boolean
  sizeInUsd: BigInt
  sizeInTokens: BigInt
  sizeDeltaUsd: BigInt
  sizeDeltaInTokens: BigInt
  collateralAmount: BigInt
  collateralTokenPriceMin: BigInt
  collateralDeltaAmount: BigInt
  executionPrice: BigInt
  proportionalPendingImpactUsd: BigInt
  priceImpactDiffUsd: BigInt
  totalImpactUsd: BigInt
  priceImpactUsd: BigInt
  priceImpactAmount: BigInt
  basePnlUsd: BigInt
  maxSize: BigInt
  isWin: Boolean
  swapImpactUsd: BigInt
  swapFeeUsd: BigInt
  feesAmount: BigInt
  block: Int
  timestamp: Int
}

type PositionChangeEdge {
  node: PositionChange!
